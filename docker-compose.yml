version: 1.0

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    enviroment:
      - MONGO_URI=${MONGO_URI}
    env_file:
      - ./backend/ .env
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
